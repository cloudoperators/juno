name: "Dependency Lisence Check"

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Run Vulnerability Check"
        id: dep-review
        uses: actions/dependency-review-action@3c4e3dcb1aa7874d2c16be7d79418e9b7efd6261 # v4.8.2
        with:
          allow-licenses: |
            MIT
            ISC
            Apache-2.0
            BSD-2-Clause
            BSD-3-Clause
            BSD-4-Clause
            CC-BY-3.0
            CC-BY-4.0
            BlueOak-1.0.0
            CC0-1.0
            0BSD
            Python-2.0
            BSD*
            Unlicense
          allow-dependencies-licenses: |
            spawndamnit@3.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
