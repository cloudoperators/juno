name: "Dependency Pinning Check 📌"

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "**/package.json"
      - "pnpm-lock.yaml"
      - ".github/scripts/check-pinned-dependencies.js"
      - ".github/workflows/check-dependency-pinning.yaml"
  push:
    branches:
      - main
    paths:
      - "**/package.json"

permissions:
  contents: read
  pull-requests: read

jobs:
  check-pinned-dependencies:
    name: "Verify Dependencies Are Pinned"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Setup Node.js"
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "22.16.0"

      - name: "Run Dependency Pinning Check"
        run: node .github/scripts/check-pinned-dependencies.js

      - name: "Check Result"
        if: failure()
        run: |
          echo "::error::Unpinned dependencies found! Please pin all dependency versions."
          echo "::error::Remove version range prefixes (^, ~, >=, etc.) from package.json files."
          echo "::error::Example: Change \"^1.2.3\" to \"1.2.3\""
          exit 1
